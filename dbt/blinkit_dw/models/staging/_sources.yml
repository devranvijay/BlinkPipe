version: 2

sources:
  - name: blinkit_raw
    schema: main
    description: Raw staging tables loaded by Airflow ETL DAG
    tables:
      - name: raw_orders
        description: Daily order transactions from MinIO raw/
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: store_id
            tests: [not_null]
          - name: status
            tests:
              - accepted_values:
                  values: [delivered, cancelled, returned]

      - name: raw_order_items
        description: Line items per order
        columns:
          - name: order_item_id
            tests: [not_null, unique]
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]

      - name: raw_products
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: raw_customers
        columns:
          - name: customer_id
            tests: [not_null, unique]

      - name: raw_stores
        columns:
          - name: store_id
            tests: [not_null, unique]
